# =========================================
# docker-compose.yml
# Starts Qdrant + chatbot together
# Prerequisite: Ollama running on host
# Usage: docker-compose up --build
# =========================================
version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  chatbot:
    build: .
    container_name: agri_rag_chatbot
    ports:
      - "7860:7860"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Points Ollama to the host machine from inside the container
      - OLLAMA_HOST=host.docker.internal
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  qdrant_data:
